services:
  - type: web
    name: heic-converter-api
    env: python
    region: frankfurt
    buildCommand: pip install --upgrade pip && pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: heic_converter
      - key: MONGODB_MAX_POOL_SIZE
        value: "10"
      - key: MONGODB_MIN_POOL_SIZE
        value: "1"