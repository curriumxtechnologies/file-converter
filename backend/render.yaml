services:
  - type: web
    name: heic-converter-api
    env: python
    region: frankfurt  # or oregon, singapore
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT --workers 4 --loop uvloop
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: heic_converter
      - key: ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app  # Update after Vercel deploy
      - key: MONGODB_MAX_POOL_SIZE
        value: "10"
      - key: MONGODB_MIN_POOL_SIZE
        value: "1"