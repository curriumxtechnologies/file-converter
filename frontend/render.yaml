services:
  - type: web
    name: file-converter-frontend
    env: static
    staticPublishPath: .
    headers:
      - path: /*
        name: Cross-Origin-Opener-Policy
        value: same-origin
      - path: /*
        name: Cross-Origin-Embedder-Policy
        value: require-corp
      - path: /*
        name: Cross-Origin-Resource-Policy
        value: cross-origin
      - path: /*.wasm
        name: Content-Type
        value: application/wasm
      - path: /*.wasm
        name: Cross-Origin-Resource-Policy
        value: cross-origin
    routes:
      - type: rewrite
        source: /*
        destination: /index.html